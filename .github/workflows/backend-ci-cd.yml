name: Backend CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  GO_VERSION: '1.25'
  # Non-secret deploy targets (override via GitHub secrets if needed)
  ECR_REPOSITORY: starttech-dev-backend
  ASG_NAME: starttech-dev-asg
  ALB_TARGET_GROUP_ARN: arn:aws:elasticloadbalancing:us-east-1:051826713811:targetgroup/starttech-dev-tg/5b4c7a34f159b1a0
  API_URL: http://starttech-dev-alb-1473945814.us-east-1.elb.amazonaws.com
  REDIS_ADDR: starttech-dev-redis.v0ue35.ng.0001.use1.cache.amazonaws.com:6379
  ALLOWED_ORIGINS: https://d3tp2sespfhcea.cloudfront.net,http://starttech-dev-alb-1473945814.us-east-1.elb.amazonaws.com
  CLOUDWATCH_LOG_GROUP: /starttech/dev/backend
  DB_NAME: much_todo_db

jobs:
  test:
    name: Test & quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test -v -count=1 ./...

      - name: Integration tests
        env:
          INTEGRATION: true
        run: go test -tags=integration -v -count=1 ./...
        continue-on-error: true

      - name: Code quality (go vet)
        run: go vet ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  build:
    name: Build & scan image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" ./backend
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

  deploy:
    name: Deploy to EC2 (rolling)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rolling deploy via SSM
        env:
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ASG_NAME: ${{ env.ASG_NAME }}
          TARGET_GROUP_ARN: ${{ env.ALB_TARGET_GROUP_ARN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ env.DB_NAME }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          REDIS_ADDR: ${{ env.REDIS_ADDR }}
          ALLOWED_ORIGINS: ${{ env.ALLOWED_ORIGINS }}
          CLOUDWATCH_LOG_GROUP: ${{ env.CLOUDWATCH_LOG_GROUP }}
        run: bash scripts/deploy-backend.sh

      - name: Smoke test (health endpoint)
        run: bash scripts/health-check.sh

      - name: Verify ASG scaling policy exists
        run: |
          aws autoscaling describe-policies \
            --auto-scaling-group-name "${ASG_NAME}" \
            --query 'ScalingPolicies[].PolicyName' \
            --output table

      - name: Deployment notification
        run: |
          echo "::notice title=Backend deployed::${API_URL}/health"
